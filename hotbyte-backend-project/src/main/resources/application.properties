
# ================================================
# HotByte - Application Configuration
# ================================================

# Server
spring.application.name=hotbyte-backend-project
server.port=8080
server.servlet.context-path=/api/v1

# ================================================
# DATABASE - MySQL
# Change YOUR_MYSQL_PASSWORD to your actual password
# If no password, leave it blank after the =
# ================================================
spring.datasource.url=your_server_url
spring.datasource.username=your_username
spring.datasource.password=your_password
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ================================================
# JPA / HIBERNATE
# ================================================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect
# ================================================
# JWT
# ================================================
app.jwt.secret=your_secret_key_here
app.jwt.expiration=86400000

# ================================================
# EMAIL - Gmail SMTP
# Step 1: Go to Google Account -> Security
# Step 2: Enable 2-Step Verification
# Step 3: Search "App Passwords" -> Generate one
# Step 4: Paste that 16-digit password below
# ================================================
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=your_email@gmail.com
spring.mail.password=your_16_digit_app_password
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.connectiontimeout=5000
spring.mail.properties.mail.smtp.timeout=5000
spring.mail.properties.mail.smtp.writetimeout=5000
app.mail.from=noreply@hotbyte.com

# ================================================
# SWAGGER UI
# Access at: http://localhost:8080/api/v1/swagger-ui/index.html
# ================================================
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui/index.html
springdoc.swagger-ui.operationsSorter=method
springdoc.swagger-ui.disable-swagger-default-url=true

# ================================================
# FILE UPLOAD
# ================================================
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=10MB
app.upload.dir=uploads/

# ================================================
# LOGGING
# ================================================
logging.level.com.hotbyte=DEBUG
logging.level.org.springframework.security=INFO
logging.level.org.hibernate.SQL=DEBUG
logging.file.name=logs/hotbyte.log
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} %-5level %logger{36} - %msg%n

razorpay.key.id='Replace your key'
razorpay.key.secret='Replace your key'